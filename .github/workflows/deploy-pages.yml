name: Deploy Slate to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/favicon.svg
          test -f dist/apple-touch-icon.png
          test -f dist/social-card.svg
          test -d dist/assets
          find dist/assets -type f -name '*.js' -print -quit | grep -q .
          find dist/assets -type f -name '*.css' -print -quit | grep -q .
          grep -Fq 'src="/slate/assets/' dist/index.html
          grep -Fq 'href="/slate/assets/' dist/index.html
          grep -Fq 'href="/slate/favicon.svg"' dist/index.html
          grep -Fq 'href="/slate/apple-touch-icon.png"' dist/index.html
          grep -Fq 'href="https://harsh.bet/slate/"' dist/index.html
          test ! -e CNAME
          test ! -e dist/CNAME
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
